version: 2
updates:
  # Dépendances npm (gérées via pnpm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "⬆️"
    groups:
      # Regroupe les patch/minor pour limiter le bruit
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      # Regroupe l'écosystème Nuxt pour des upgrades cohérents
      nuxt:
        patterns:
          - "nuxt"
          - "@nuxt/*"
          - "@nuxtjs/*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "@nuxt/eslint*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "⬆️"
